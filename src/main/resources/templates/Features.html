<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: linear-gradient(135deg, #1f4037, #99f2c8);
    --card: rgba(255,255,255,0.15);
    --text: #fff;
    --primary: linear-gradient(135deg, #ff7eb3, #ff758c);
    --secondary: linear-gradient(135deg, #43cea2, #185a9d);
}

.dark {
    --bg: linear-gradient(135deg, #141e30, #243b55);
    --card: rgba(255,255,255,0.08);
    --text: #f5f5f5;
}

/* Body */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* Toggle */
.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--secondary);
    border: none;
    padding: 10px 18px;
    border-radius: 30px;
    color: #fff;
    cursor: pointer;
}

/* Container */
.container {
    max-width: 1100px;
    margin: 80px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

/* Grid */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    align-items: start; /* 🔥 IMPORTANT (no equal height issue) */
}

/* Card */
.card {
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.4s;
    animation: fadeUp 0.6s ease;
}

/* 🔥 HOVER EFFECT */
.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.start-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 35px;
    background: var(--primary);
    color: #fff;
    border-radius: 30px;
    text-decoration: none;
    font-size: 1.1rem;
}

/* Footer */
footer {
    margin-top: 60px;
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌙 Toggle</button>

<div class="container">
    <h1>Product Management Dashboard</h1>

    <div class="cards">

        <!-- ADD PRODUCT -->
        <div class="card">
            <h3>Add Product</h3>
            <form action="addProduct" >
                <input type="text" name="name" placeholder="Product Name" required>
                <input type="text" name="place" placeholder="Place" required>
                <input type="text" name="type" placeholder="Type" required>
                <input type="number" name="warrenty" placeholder="Warranty" required>
                <button type="submit">Add Product</button>
            </form>
        </div>

        <!-- FETCH ALL -->
        <div class="card">
            <h3>Fetch All Products</h3>
            <form action="/getProducts" method="get">
                <button type="submit">View All</button>
            </form>
        </div>

        <!-- SEARCH BY NAME -->
        <div class="card">
            <h3>Search by Name</h3>
            <form action="searchByName" >
                <input type="text" name="name" placeholder="Enter Product Name" required>
                <button type="submit">Search</button>
            </form>
        </div>

        <!-- SEARCH BY WARRANTY -->
        <div class="card">
            <h3>Search by Warranty</h3>
            <form action="/searchByWarranty" >
                <input type="number" name="warrenty" placeholder="Enter Warranty" required>
                <button type="submit">Search</button>
            </form>
        </div>
		
		<!-- SEARCH BY type -->
		       <div class="card">
		           <h3>Search by Type By Chararcter</h3>
		           <form action="searchByType" >
		               <input type="text" name="Type" placeholder="Enter type" required>
		               <button type="submit">Search</button>
		           </form>
		       </div>

    </div>
</div>

<center>
            <a href="login" class="start-btn">Log-Out</a>
        </center>

<footer>
    <p>© 2026 Product Management System | Spring Boot Project | By Naeem Shaikh</p>
</footer>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
