<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: linear-gradient(135deg, #00c9a7, #007f5f);
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    background: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Checkmark */
.check {
    font-size: 60px;
    margin-bottom: 20px;
    animation: pop 0.5s ease;
}

@keyframes pop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}

/* Button */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #fff;
    color: #007f5f;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #e6fff7;
}
</style>
</head>

<body>

<div class="card">
    <div class="check">✅</div>

    <h2>Account Created Successfully!</h2>
    <p>Your account has been created and is ready to use.</p>

    <!-- Redirect Button -->
    <button class="btn" onclick="goToLogin()">Go to Login</button>
</div>

<script>
function goToLogin() {
    window.location.href = "login"; // change if using Spring route
}
</script>

</body>
</html>
