<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: #fff;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
.card h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

/* Message */
.card p {
    font-size: 1.1rem;
    margin-bottom: 20px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 12px 25px;
    border-radius: 30px;
    background: #fff;
    color: rgb(128, 255, 128);
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card">
    <h1>Product Status</h1>

    <!-- Dynamic message -->
    <p th:text="${msg}">Successfully added</p>
	


    <!-- Redirect Button -->
    <a href="Features" class="btn">Go Back</a>
</div>

</body>
</html>
