<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: #fff;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
.card h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

/* Message */
.card p {
    font-size: 1.1rem;
    margin-bottom: 20px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 12px 25px;
    border-radius: 30px;
    background: #fff;
    color: rgb(128, 255, 128);
    text-decoration: none;
    font-weight: bold;
	align-items: center	;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 cards per row */
    gap: 20px;
}
</style>
</head>

<body>

<div class="container">
	
    <h1 th:text="${title}"> ${title}</h1> 
	
	<p th:if="${error}" th:text="${error}" style="color:red; font-size:18px;"></p>
	<div class="grid"> 
		<!-- LOOP PRODUCTS --> 
		<div class="card" th:each="p : ${msg}"> 
			<h3 th:text="${p.name}">Product Name</h3> 
			<p>📍 Place: <span th:text="${p.place}">Place</span></p> 
			<p>📦 Type: <span th:text="${p.type}">Type</span></p> 
			<span class="tag"> Warranty: <span th:text="${p.warrenty}">1</span> Year </span> 
		</div> </div> 
		<br>
		<br>
		<a href="/Features" class="btn">⬅ Back</a>
</div>

</body>
</html>
