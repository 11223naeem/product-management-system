<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Bank Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: linear-gradient(135deg, #00c9a7, #007f5f);
    --accent: #00c9a7;
    --text: #ffffff;
}

/* Background */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    background: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Floating animation */
body::before, body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    animation: float 6s infinite ease-in-out;
}

body::before {
    width: 200px;
    height: 200px;
    top: 10%;
    left: 20%;
}

body::after {
    width: 280px;
    height: 280px;
    bottom: 10%;
    right: 20%;
    animation-delay: 2s;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    color: var(--text);
    animation: fadeIn 1s ease-in-out;
}

/* Fade */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    margin-bottom: 25px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 10px;
    outline: none;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #ffffff;
    color: #007f5f;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #e6fff7;
}

/* Back link */
.back {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #fff;
    border: 1px solid #fff;
    padding: 10px;
    border-radius: 30px;
    transition: 0.3s;
}

.back:hover {
    background: #fff;
    color: #007f5f;
}
</style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <!-- Backend connection -->
    <form action="CreateAccounts">

        <input type="text" name="name" placeholder="Account Holder Name" required>

        <input type="text" name="pass" placeholder="Create Password" maxlength="10" required>

        <button type="submit" class="btn">Create Account</button>
    </form>

    <a href="login" class="back">← Back to Login</a>
</div>

</body>
</html>
